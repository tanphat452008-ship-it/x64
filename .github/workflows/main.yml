name: Build APK Windows (Release Version)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Android SDK + NDK r16b
      - name: Set up Android SDK & NDK r16b
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-33 build-tools;33.0.2 ndk;16.1.4479499 cmake;3.10.2.4988404"
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      # 4. Enable long paths for Windows
      - name: Enable long paths
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        shell: powershell

      # 5. Build Debug APK
      - name: Build Debug APK
        shell: cmd
        run: |
          call gradlew.bat assembleDebug --stacktrace

      # 6. Upload APK to GitHub Release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: build-${{ github.run_number }}
          name: Debug Build v${{ github.run_number }}
          body: |
            Bản build mới nhất từ nhánh ${{ github.ref_name }}.
            Mã commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
